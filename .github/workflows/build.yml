name: Build & Release

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build (nix)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # for FlakeHub Cache
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/flakehub-cache-action@main
      - name: nix build .#default
        run: nix build .#default --print-build-logs
      - run: ls -la result/share/zellij-agent-tabs/

  # Auto-versioning:
  #   - push to master   -> patch bump from the latest v* tag (tag + Cargo.toml synced)
  #   - push a tag vX.Y.Z -> release that exact version (use for minor/major bumps)
  # The Cargo.toml sync commit + created tag use GITHUB_TOKEN, which by design does
  # NOT trigger another workflow run (plus "[skip ci]" as belt-and-suspenders).
  release:
    name: Release
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write   # for FlakeHub OIDC
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/flakehub-cache-action@main

      - name: Determine version
        id: v
        run: |
          git fetch --tags --force
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            ver="${GITHUB_REF#refs/tags/v}"          # manual minor/major
          else
            latest="$(git tag -l 'v*' --sort=-version:refname | head -n1)"
            latest="${latest:-v0.0.0}"
            base="${latest#v}"
            major="${base%%.*}"; rest="${base#*.}"; minor="${rest%%.*}"; patch="${rest##*.}"
            ver="${major}.${minor}.$((patch + 1))"   # master patch bump
          fi
          echo "ver=$ver"  >> "$GITHUB_OUTPUT"
          echo "tag=v$ver" >> "$GITHUB_OUTPUT"

      - name: Sync Cargo.toml version on master
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B master origin/master
          sed -i -E "0,/^version = \".*\"/{s//version = \"${{ steps.v.outputs.ver }}\"/}" Cargo.toml
          if ! git diff --quiet Cargo.toml; then
            git add Cargo.toml
            git commit -m "chore(release): ${{ steps.v.outputs.tag }} [skip ci]"
            git push origin master
          fi

      - name: Create tag (master patch bumps only)
        if: github.ref == 'refs/heads/master'
        run: |
          git tag "${{ steps.v.outputs.tag }}"
          git push origin "${{ steps.v.outputs.tag }}"

      - name: Build wasm (nix)
        run: nix build .#default --print-build-logs

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp result/share/zellij-agent-tabs/zellij-agent-tabs.wasm ./zellij-agent-tabs.wasm
          gh release create "${{ steps.v.outputs.tag }}" ./zellij-agent-tabs.wasm \
            --title "${{ steps.v.outputs.tag }}" \
            --generate-notes

      # Publishes the flake to FlakeHub (repo is connected). Runs after the GitHub
      # release, so even if this hiccups the wasm download is already available.
      - name: Publish to FlakeHub
        uses: DeterminateSystems/flakehub-push@main
        with:
          visibility: public
          tag: ${{ steps.v.outputs.tag }}
