name: Build Plugin

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build wasm32-wasip1
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-wasip1

      - name: Build plugin
        run: cargo build --release --target wasm32-wasip1

      - name: Verify plugin exists
        run: |
          if [ -f "target/wasm32-wasip1/release/zellij-agent-tabs.wasm" ]; then
            echo "Plugin found: target/wasm32-wasip1/release/zellij-agent-tabs.wasm"
            ls -la "target/wasm32-wasip1/release/zellij-agent-tabs.wasm"
          else
            echo "Plugin not found!"
            echo "Contents of release directory:"
            ls -la "target/wasm32-wasip1/release/" || echo "Release directory doesn't exist"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: zellij-agent-tabs-wasm32-wasip1
          path: target/wasm32-wasip1/release/zellij-agent-tabs.wasm
          if-no-files-found: error

  # Auto-versioning:
  #   - push to master        -> patch bump from the latest v* tag (tag + Cargo.toml)
  #   - push a tag vX.Y.Z      -> release that exact version (use for minor/major bumps)
  # The Cargo.toml sync commit and the created tag use GITHUB_TOKEN, which by design
  # does NOT trigger another workflow run (plus "[skip ci]" as belt-and-suspenders).
  release:
    name: Release
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Determine version
        id: v
        run: |
          git fetch --tags --force
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            ver="${GITHUB_REF#refs/tags/v}"          # manual minor/major
          else
            latest="$(git tag -l 'v*' --sort=-version:refname | head -n1)"
            latest="${latest:-v0.0.0}"
            base="${latest#v}"
            major="${base%%.*}"; rest="${base#*.}"; minor="${rest%%.*}"; patch="${rest##*.}"
            ver="${major}.${minor}.$((patch + 1))"   # master patch bump
          fi
          echo "ver=$ver"  >> "$GITHUB_OUTPUT"
          echo "tag=v$ver" >> "$GITHUB_OUTPUT"

      - name: Sync Cargo.toml version on master
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B master origin/master
          sed -i -E "0,/^version = \".*\"/{s//version = \"${{ steps.v.outputs.ver }}\"/}" Cargo.toml
          if ! git diff --quiet Cargo.toml; then
            git add Cargo.toml
            git commit -m "chore(release): ${{ steps.v.outputs.tag }} [skip ci]"
            git push origin master
          fi

      - name: Create tag (master patch bumps only)
        if: github.ref == 'refs/heads/master'
        run: |
          git tag "${{ steps.v.outputs.tag }}"
          git push origin "${{ steps.v.outputs.tag }}"

      - name: Build wasm
        run: cargo build --release --target wasm32-wasip1

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.v.outputs.tag }}
          name: ${{ steps.v.outputs.tag }}
          files: target/wasm32-wasip1/release/zellij-agent-tabs.wasm
          draft: false
          generate_release_notes: true
